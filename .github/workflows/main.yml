name: CI Pipeline for Agent Evaluation

on:
  push:
    branches: [ main ]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Added langgraph-checkpoint-sqlite to fix the persistence error
        pip install fastapi uvicorn langgraph langgraph-checkpoint-sqlite langchain-groq langchain-community langchain-core chromadb python-dotenv pydantic requests fastembed datasets pypdf langchain-chroma
        
    - name: Build Knowledge Base (Lab 2 Requirement)
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: |
        # This creates the chroma_db folder on the GitHub server
        python ingest_data.py
        
    - name: Run Evaluation Gate
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        CI: "true"
      run: |
        # 1. Start the API
        nohup python -m uvicorn main:app --host 127.0.0.1 --port 8000 > server_log.txt 2>&1 &
        
        # 2. Faster Health Check (Wait max 60 seconds)
        echo "Waiting for API to start..."
        timeout 60s bash -c 'until curl -s http://127.0.0.1:8000/ > /dev/null; do sleep 5; echo "Waiting..."; done' || (cat server_log.txt && exit 1)
        
        # 3. Run the evaluation script
        python run_eval.py