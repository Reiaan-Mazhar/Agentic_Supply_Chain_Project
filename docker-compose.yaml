services:
  agent_api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - vectordb
    volumes:
      - ./checkpoint_db.sqlite:/app/checkpoint_db.sqlite

  vectordb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - ./chroma_data:/chroma/chroma

volumes:
  chroma_data: